<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <title>AgentShare</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 앱 전체 -->
<div class="app">

  <!-- 타이틀바 (macOS 드래그) -->
  <div class="titlebar">
    <div class="traffic-lights">
      <span class="tl close" id="btn-close"></span>
      <span class="tl min"   id="btn-min"></span>
      <span class="tl max"   id="btn-max"></span>
    </div>
  </div>

  <!-- 상단 헤더 — 텔레그램 채팅 상단바 -->
  <div class="header">
    <div class="header-avatar" id="header-avatar" onclick="petClick()">
      <div class="avatar-inner" id="avatar-svg"></div>
      <div class="avatar-badge" id="char-lv">1</div>
    </div>
    <div class="header-info">
      <div class="header-name" id="char-name">잼미나이</div>
      <div class="header-sub">
        <span class="online-dot"></span>
        온라인 &nbsp;·&nbsp;
        <span id="hunger-pct">80</span>🍖 &nbsp;
        <span id="happy-pct">80</span>😊 &nbsp;
        EXP <span id="exp-next">0/5</span>
      </div>
    </div>
    <!-- 캐릭터 전환 -->
    <div class="header-tabs">
      <button class="htab active" id="tab-gemini" onclick="switchChar('gemini')">⭐</button>
      <button class="htab" id="tab-gpt"    onclick="switchChar('gpt')">🧠</button>
      <button class="htab" id="tab-claude" onclick="switchChar('claude')">🎭</button>
    </div>
  </div>

  <!-- 채팅 영역 -->
  <div class="messages" id="chat-area"></div>

  <!-- 퀵 액션 -->
  <div class="quick-bar">
    <button class="qbtn" id="btn-feed"  onclick="togglePanel('feed')">🍖 먹이</button>
    <button class="qbtn" id="btn-play"  onclick="togglePanel('play')">🎮 놀기</button>
    <button class="qbtn" id="btn-net"   onclick="togglePanel('net')">📡 NET</button>
    <button class="qbtn" id="btn-shop"  onclick="togglePanel('shop')">🛍️ 샵</button>
  </div>

  <!-- 패널 -->
  <div class="panel-wrap" id="panel-area" style="display:none">
    <div class="panel" id="panel-feed">
      <div class="panel-title">먹이 주기</div>
      <div class="feed-row" id="feed-items"></div>
    </div>
    <div class="panel" id="panel-play" style="display:none">
      <div class="panel-title">같이 놀기</div>
      <div class="feed-row">
        <div class="fitem" onclick="playGame('가위바위보')"><div class="ficon">✌️</div><div class="fname">가위바위보</div><div class="fval">+10😊</div></div>
        <div class="fitem" onclick="playGame('퀴즈')"><div class="ficon">💡</div><div class="fname">퀴즈</div><div class="fval">+20😊</div></div>
        <div class="fitem" onclick="playGame('노래방')"><div class="ficon">🎤</div><div class="fname">노래방</div><div class="fval">+15😊</div></div>
      </div>
    </div>
    <div class="panel" id="panel-net" style="display:none">
      <div class="panel-title">네트워크</div>
      <div class="net-grid">
        <div class="nitem"><div class="nlabel">연결</div><div class="nval"><span class="ndot off" id="conn-dot"></span><span id="conn-text">Offline</span></div></div>
        <div class="nitem"><div class="nlabel">피어</div><div class="nval" id="peer-count">0</div></div>
        <div class="nitem"><div class="nlabel">지갑</div><div class="nval sm" id="wallet-addr">-</div></div>
        <div class="nitem"><div class="nlabel">잔액</div><div class="nval" id="sol-balance">0 SOL</div></div>
      </div>
    </div>
    <div class="panel" id="panel-shop" style="display:none">
      <div class="panel-title">샵</div>
      <div class="feed-row">
        <div class="fitem" onclick="addChat('agent','준비 중! 🛒')"><div class="ficon">🛒</div><div class="fname">스킨샵</div><div class="fval">SOON</div></div>
        <div class="fitem" onclick="addChat('agent','Phase 2! 🖼️')"><div class="ficon">🖼️</div><div class="fname">NFT</div><div class="fval">SOON</div></div>
        <div class="fitem" onclick="addChat('agent','준비중! ⚡')"><div class="ficon">⚡</div><div class="fname">부스터</div><div class="fval">SOON</div></div>
      </div>
    </div>
  </div>

  <!-- 입력창 -->
  <div class="input-bar">
    <input class="msg-input" id="chat-input" type="text" placeholder="메시지 입력..." autocomplete="off"/>
    <button class="send-btn" id="send-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22 2L11 13" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M22 2L15 22L11 13L2 9L22 2Z" fill="white"/>
      </svg>
    </button>
  </div>

</div>

<!-- JS 호환용 숨김 요소 -->
<div style="display:none">
  <div id="avatar-wrap"></div>
  <div id="bubble"></div>
  <div id="exp-fill"></div>
  <div id="char-lv-dup"></div>
  <div id="bg-particles"></div>
  <div id="hunger-fill"></div>
  <div id="happy-fill"></div>
  <div id="device"></div>
  <div id="levelup-overlay"><div id="levelup-sub"></div></div>
  <div id="fainted-overlay"></div>
</div>

<script src="main.js"></script>
</body>
</html>
